<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rejoins sur done</title>
    <meta name="description" content="Rejoins ton groupe sur done — l'app de taches collaborative pour coloc, famille et couple.">

    <!-- OG / Twitter (preview riche dans Messages, WhatsApp, Discord, etc.) -->
    <meta property="og:title" content="Rejoins sur done">
    <meta property="og:description" content="Un code t'a ete envoye — clique pour ouvrir l'app et rejoindre.">
    <meta property="og:image" content="https://laurentarsene.github.io/done-privacy/og.png">
    <meta property="og:url" content="https://laurentarsene.github.io/done-privacy/join.html">
    <meta property="og:type" content="website">
    <meta name="twitter:card" content="summary_large_image">

    <link rel="icon" href="icon.svg" type="image/svg+xml">
    <link href="https://fonts.googleapis.com/css2?family=Fraunces:wght@400;500;600&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --ink: #1A1814;
            --cream: #F5EFE7;
            --coral: #E54D2E;
            --peach: #F4A261;
            --lavender: #B4B3D6;
            --dusk: #6B5B8E;
            --ink-soft: rgba(26, 24, 20, 0.55);
            --ink-faint: rgba(26, 24, 20, 0.35);
            --ink-whisper: rgba(26, 24, 20, 0.08);
        }
        body {
            font-family: 'Inter', -apple-system, sans-serif;
            background: var(--cream);
            color: var(--ink);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 48px 24px;
            -webkit-font-smoothing: antialiased;
            position: relative;
            overflow: hidden;
        }
        /* Sunset gradient overlay */
        body::before {
            content: '';
            position: absolute;
            inset: 0;
            background:
                radial-gradient(ellipse at 20% 0%, rgba(244, 162, 97, 0.18) 0%, transparent 50%),
                radial-gradient(ellipse at 80% 100%, rgba(180, 179, 214, 0.22) 0%, transparent 55%);
            pointer-events: none;
        }
        .card {
            position: relative;
            background: rgba(255, 253, 249, 0.72);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border-radius: 28px;
            padding: 52px 36px 44px;
            max-width: 420px;
            width: 100%;
            text-align: center;
            box-shadow:
                0 1px 0 rgba(255, 255, 255, 0.8) inset,
                0 32px 80px rgba(26, 24, 20, 0.08),
                0 0 0 0.5px rgba(26, 24, 20, 0.06);
            animation: fadeUp 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards;
            opacity: 0;
            transform: translateY(16px);
        }
        @keyframes fadeUp {
            to { opacity: 1; transform: translateY(0); }
        }
        .logo {
            font-family: 'Fraunces', serif;
            font-weight: 400;
            font-size: 52px;
            letter-spacing: -1px;
            color: var(--ink);
            margin-bottom: 6px;
            line-height: 1;
        }
        .tag {
            display: inline-block;
            font-size: 10px;
            font-weight: 600;
            letter-spacing: 2.4px;
            color: var(--ink-faint);
            margin-bottom: 40px;
            text-transform: uppercase;
        }
        h1 {
            font-family: 'Fraunces', serif;
            font-weight: 500;
            font-size: 34px;
            line-height: 1.1;
            letter-spacing: -0.5px;
            margin-bottom: 14px;
            color: var(--ink);
        }
        .sub {
            color: var(--ink-soft);
            font-family: 'Fraunces', serif;
            font-weight: 400;
            font-style: italic;
            font-size: 15px;
            line-height: 1.6;
            margin-bottom: 36px;
        }
        .code-box {
            background: rgba(26, 24, 20, 0.035);
            border: 0.5px solid var(--ink-whisper);
            border-radius: 18px;
            padding: 22px 20px;
            margin-bottom: 32px;
            position: relative;
        }
        .code-box::before,
        .code-box::after {
            content: '';
            position: absolute;
            width: 10px;
            height: 10px;
            border: 1px solid var(--ink-faint);
        }
        .code-box::before {
            top: 8px; left: 8px;
            border-right: 0; border-bottom: 0;
        }
        .code-box::after {
            bottom: 8px; right: 8px;
            border-left: 0; border-top: 0;
        }
        .code-label {
            font-size: 9px;
            font-weight: 600;
            letter-spacing: 2.2px;
            color: var(--ink-faint);
            margin-bottom: 10px;
            text-transform: uppercase;
        }
        .code {
            font-family: 'Fraunces', serif;
            font-weight: 500;
            font-size: 42px;
            color: var(--coral);
            letter-spacing: 5px;
            line-height: 1;
        }
        .btn-stack {
            display: flex;
            flex-direction: column;
            gap: 10px;
            align-items: stretch;
        }
        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            padding: 15px 28px;
            border-radius: 40px;
            font-family: 'Inter', sans-serif;
            font-weight: 600;
            font-size: 14px;
            text-decoration: none;
            transition: transform 0.18s ease, box-shadow 0.18s ease;
        }
        .btn-primary {
            background: var(--ink);
            color: var(--cream);
            box-shadow: 0 8px 24px rgba(26, 24, 20, 0.2);
        }
        .btn-primary:hover { transform: translateY(-1px); box-shadow: 0 10px 28px rgba(26, 24, 20, 0.25); }
        .btn-ghost {
            background: transparent;
            color: var(--ink);
            border: 1px solid rgba(26, 24, 20, 0.12);
        }
        .btn-ghost:hover { background: rgba(26, 24, 20, 0.03); }
        .hint {
            font-size: 12px;
            font-style: italic;
            color: var(--ink-faint);
            margin-top: 22px;
            font-family: 'Fraunces', serif;
        }
        .footer {
            margin-top: 32px;
            font-size: 11px;
            color: var(--ink-faint);
            letter-spacing: 0.5px;
        }
        .footer a { color: var(--ink-soft); text-decoration: none; }
        .footer a:hover { color: var(--ink); }
        .dot { opacity: 0.4; margin: 0 6px; }
    </style>
</head>
<body>
    <div class="card">
        <div class="logo">done</div>
        <div class="tag">Invitation</div>
        <h1>Rejoins ton groupe</h1>
        <p class="sub">Quelqu'un t'a invite a un groupe.<br>Ouvre l'app avec ce code.</p>
        <div class="code-box">
            <div class="code-label">Code</div>
            <div class="code" id="code">——————</div>
        </div>
        <div class="btn-stack">
            <a id="open-app" class="btn btn-primary" href="#">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M18.71 19.5c-.83 1.24-1.71 2.45-3.05 2.47-1.34.03-1.77-.79-3.29-.79-1.53 0-2 .77-3.27.82-1.31.05-2.3-1.32-3.14-2.53C4.25 17 2.94 12.45 4.7 9.39c.87-1.52 2.43-2.48 4.12-2.51 1.28-.02 2.5.87 3.29.87.78 0 2.26-1.07 3.8-.91.65.03 2.47.26 3.64 1.98-.09.06-2.17 1.28-2.15 3.81.03 3.02 2.65 4.03 2.68 4.04-.03.07-.42 1.44-1.38 2.83M13 3.5c.73-.83 1.94-1.46 2.94-1.5.13 1.17-.34 2.35-1.04 3.19-.69.85-1.83 1.51-2.95 1.42-.15-1.15.41-2.35 1.05-3.11z"/></svg>
                Ouvrir done
            </a>
            <a id="app-store" class="btn btn-ghost" href="https://apps.apple.com/app/done">
                Telecharger sur l'App Store
            </a>
        </div>
        <p class="hint">Pas encore l'app ? Telecharge-la, puis reviens ici.</p>
        <div class="footer">
            <a href="index.html">done</a>
            <span class="dot">·</span>
            <a href="privacy.html">Confidentialite</a>
        </div>
    </div>

    <script>
        const params = new URLSearchParams(window.location.search);
        const code = (params.get('code') || '').toUpperCase().trim();

        if (code) {
            document.getElementById('code').textContent = code;
            const appURL = `done://join?code=${encodeURIComponent(code)}`;
            document.getElementById('open-app').href = appURL;

            setTimeout(() => {
                if (navigator.userAgent.match(/iPhone|iPad|iPod/i)) {
                    window.location.href = appURL;
                }
            }, 400);
        } else {
            document.getElementById('open-app').style.display = 'none';
        }
    </script>
</body>
</html>
